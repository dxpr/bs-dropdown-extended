version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    # Look for `package.json` and `package-lock.json` files in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
    # Specify target branch
    target-branch: "1.x"
    # Labels on pull requests
    labels:
      - "dependencies"
      - "npm"
    # Assign reviewers
    reviewers:
      - "dxpr/maintainers"
    # Group all updates together
    groups:
      dependencies:
        patterns:
          - "*"

  # Enable version updates for Python/pip
  - package-ecosystem: "pip"
    # Look for requirements.txt in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
    # Specify target branch
    target-branch: "1.x"
    # Labels on pull requests
    labels:
      - "dependencies"
      - "python"
    # Assign reviewers
    reviewers:
      - "dxpr/maintainers"
    # Group all updates together
    groups:
      dependencies:
        patterns:
          - "*" 